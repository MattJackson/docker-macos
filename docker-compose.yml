services:
  macos:
    build: .
    restart: unless-stopped
    privileged: true
    environment:
      - IMAGE_PATH=/image
      - HOST_IFACE=eth0        # your host's physical network interface
      - RAM=16                 # install: 24, running: 16
      - SMP=16                 # install: 24, running: 8
      - CORES=16               # install: 24, running: 8
      - DISK_SIZE=256G
      - VGAMEM_MB=512          # framebuffer VRAM — real ceiling of qemu-mos15's vmware-svga device model. Requesting more (4096 tested) allocates in QEMU but device caps the guest-visible size at 512 MB. Doubled from the old 256 MB default. Honest hardware value, no lying to the guest.
    volumes:
      - ./mac_hdd_ng.img:/image
    network_mode: host

  novnc:
    image: geek1011/easy-novnc
    restart: unless-stopped
    command: --addr :6080 --host 127.0.0.1 --port 5901 --no-url-password
    network_mode: host
    depends_on:
      - macos
